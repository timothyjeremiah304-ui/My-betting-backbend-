<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WackoBet Live Engine</title>
    <style>
        body { margin: 0; padding: 0; background-color: #121212; font-family: Arial, sans-serif; color: #fff; padding-bottom: 80px; -webkit-user-select: none; user-select: none; }
        .header { background-color: #1a1a1a; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #e41e26; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 22px; font-weight: 900; color: #e41e26; }
        .logo span { color: #ffb703; }
        .wallet-box { background-color: #262626; padding: 6px 12px; border-radius: 4px; border: 1px solid #ffb703; font-weight: bold; }
        .main-container { padding: 12px; }
        .section-title { font-size: 14px; color: #ffb703; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
        .live-dot { width: 8px; height: 8px; background-color: #2a9d8f; border-radius: 50%; display: inline-block; animation: flash 1.5s infinite; }
        @keyframes flash { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
        .match-card { background-color: #1c1c1c; border-radius: 8px; padding: 12px; margin-bottom: 12px; border-left: 4px solid #2a9d8f; }
        .match-meta { display: flex; justify-content: space-between; font-size: 11px; color: #888; margin-bottom: 6px; }
        .league-tag { color: #ffb703; font-weight: bold; }
        .match-main { display: flex; justify-content: space-between; align-items: center; }
        .teams-flex { display: flex; flex-direction: column; gap: 6px; font-weight: bold; width: 55%; }
        .team-row { display: flex; justify-content: space-between; padding-right: 15px; }
        .live-score { color: #ffb703; font-weight: 800; }
        .odds-container { display: flex; gap: 6px; width: 45%; justify-content: flex-end; }
        .odds-btn { background-color: #2b2b2b; border: 1px solid #3a3a3a; color: white; flex: 1; padding: 10px 2px; border-radius: 4px; font-weight: bold; text-align: center; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .odds-btn:active, .odds-btn.selected { background-color: #e41e26; border-color: #e41e26; }
        .odds-val { display: block; color: #ffb703; font-size: 13px; }
        
        /* Bottom Navigation Bar Layout */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 60px; background-color: #1a1a1a; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #2d2d2d; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #888; font-size: 11px; cursor: pointer; width: 20%; text-align: center; -webkit-tap-highlight-color: transparent; }
        .nav-item.active { color: #e41e26; }
        .nav-icon { font-size: 18px; margin-bottom: 2px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">WACKO<span>BET</span></div>
        <div id="wallet-display" class="wallet-box">Bal: $500.00</div>
    </div>

    <div class="main-container">
        <div class="section-title"><span class="live-dot"></span> LIVE IN-PLAY SPORTSBOOK STREAM</div>
        <div id="live-matches-target">Connecting to running platform stream...</div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="handleNav(this, 'home')"><span class="nav-icon">🏠</span><span>Home</span></div>
        <div class="nav-item" onclick="handleNav(this, 'live')"><span class="nav-icon">🔥</span><span>Live</span></div>
        <div class="nav-item" onclick="handleNav(this, 'bets')"><span class="nav-icon">📋</span><span>My Bets</span></div>
        <div class="nav-item" onclick="handleNav(this, 'profile')"><span class="nav-icon">👤</span><span>Profile</span></div>
    </div>

    <script>
        // High-frequency automated data synchronization engine
        async function fetchRealLiveMatches() {
            try {
                const response = await fetch('/api/live-fixtures');
                let matches = await response.json();
                
                let container = document.getElementById('live-matches-target');
                
                // FALLBACK VIRTUAL STREAM: If global real-life matches are empty right now, generate running simulated fixtures instantly
                if(!matches || matches.length === 0) {
                    matches = [
                        { id: 101, league: "PREMIER SIMULATOR", team1: "Manchester United", team2: "Chelsea", time: Math.floor(Math.random() * 40) + 45, score1: Math.floor(Math.random() * 3), score2: Math.floor(Math.random() * 2), odds: [1.85, 3.40, 4.20] },
                        { id: 102, league: "LIGA LIVE IN-PLAY", team1: "Barcelona", team2: "Atletico Madrid", time: Math.floor(Math.random() * 80) + 5, score1: Math.floor(Math.random() * 2), score2: Math.floor(Math.random() * 2), odds: [2.15, 3.10, 3.10] }
                    ];
                }

                let html = "";
                matches.forEach(m => {
                    html += `
                    <div class="match-card">
                        <div class="match-meta">
                            <span class="league-tag">${m.league}</span>
                            <span style="color:#2a9d8f; font-weight:bold;">● RUNNING ${m.time}'</span>
                        </div>
                        <div class="match-main">
                            <div class="teams-flex">
                                <div class="team-row"><span>${m.team1}</span><span class="live-score">${m.score1}</span></div>
                                <div class="team-row"><span>${m.team2}</span><span class="live-score">${m.score2}</span></div>
                            </div>
                            <div class="odds-container">
                                <button class="odds-btn" onclick="toggleOddsSelection(this)">1<span class="odds-val">${m.odds[0].toFixed(2)}</span></button>
                                <button class="odds-btn" onclick="toggleOddsSelection(this)">X<span class="odds-val">${m.odds[1].toFixed(2)}</span></button>
                                <button class="odds-btn" onclick="toggleOddsSelection(this)">2<span class="odds-val">${m.odds[2].toFixed(2)}</span></button>
                            </div>
                        </div>
                    </div>`;
                });
                container.innerHTML = html;
            } catch (err) {
                console.error("Data stream sync dropped:", err);
            }
        }

        // Handle active button switching without triggering phone text selectors
        function handleNav(element, pageName) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
            
            if(pageName === 'bets') {
                document.getElementById('live-matches-target').innerHTML = "<div style='padding:40px; text-align:center; color:#888;'>📋 No active betslips settled yet. Clear ticket history empty.</div>";
            } else if (pageName === 'profile') {
                document.getElementById('live-matches-target').innerHTML = "<div style='padding:40px; text-align:center; color:#888;'>👤 Account ID: WackoUser-9402<br>Verification Level: 1 Premium</div>";
            } else {
                fetchRealLiveMatches();
            }
        }

        function toggleOddsSelection(btn) {
            btn.classList.toggle('selected');
        }

        // Initialize and lock execution loop to 4 seconds for fluid screen updates
        fetchRealLiveMatches();
        setInterval(fetchRealLiveMatches, 4000);
    </script>
</body>
</html>
